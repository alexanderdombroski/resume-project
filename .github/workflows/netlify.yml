name: Deploy to Netlify

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths: 
      - 'packages/bakeoff3/**'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  PACKAGE_PATH: packages/bakeoff3

jobs:
  # Single deploy job since we're just deploying
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install
        run: npm ci --workspace=${{ env.PACKAGE_PATH }}
      - name: Build
        run: npm run build --workspace=${{ env.PACKAGE_PATH }}
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      - name: Deploy
        run: npx netlify deploy --prod --no-build --dir "./packages/bakeoff3/dist" --site "607dbdde-ceb9-4c6a-8b31-13c9b7f4cb2a"
        working-directory: ${{ env.PACKAGE_PATH }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
